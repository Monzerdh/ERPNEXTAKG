# Local ERPNext stack for testing AKG ESS edits against a restore of the
# production site. Adapted from frappe_docker's pwd.yml.
#
# Image `akg-erpnext:local` is built once (see RUNBOOK.md) from apps.json
# (frappe 15.72.3 + erpnext 15.66.1 + hrms 15.47.4 + akg_ess).
#
# The host repo is bind-mounted over the baked app so your edits to
# akg_ess are live in the container — no image rebuild per change.
# Point AKG_ESS_SRC at the repo root (the folder with pyproject.toml).

x-customizable-image: &customizable_image
  image: akg-erpnext:local
  pull_policy: never

x-backend-defaults: &backend_defaults
  <<: *customizable_image
  # akg_ess isn't pip-installed in the image (it's bind-mounted), and a
  # runtime `pip install -e` is wiped whenever the container is recreated.
  # Put the app on PYTHONPATH so `import akg_ess` works durably everywhere.
  environment:
    PYTHONPATH: /home/frappe/frappe-bench/apps/akg_ess
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    # Live-mount the working copy of akg_ess (edit on host -> live in bench).
    - ${AKG_ESS_SRC:-..}:/home/frappe/frappe-bench/apps/akg_ess

services:
  backend:
    <<: *backend_defaults
    networks: [akg]

  configurator:
    <<: *backend_defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    depends_on:
      db: { condition: service_healthy }
      redis-cache: { condition: service_started }
      redis-queue: { condition: service_started }
    restart: "no"
    networks: [akg]

  create-site:
    <<: *backend_defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        bench new-site dev.localhost
        --no-mariadb-socket
        --admin-password=admin
        --db-root-password=admin
        --install-app erpnext --install-app hrms
        --set-default || echo "site exists, skipping";
    depends_on:
      configurator: { condition: service_completed_successfully }
    restart: "no"
    networks: [akg]

  db:
    image: mariadb:10.6
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 1s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    networks: [akg]

  redis-cache:
    image: redis:6.2-alpine
    volumes: [redis-cache-data:/data]
    networks: [akg]

  redis-queue:
    image: redis:6.2-alpine
    volumes: [redis-queue-data:/data]
    networks: [akg]

  scheduler:
    <<: *backend_defaults
    command: ["bench", "schedule"]
    networks: [akg]

  queue-short:
    <<: *backend_defaults
    command: ["bench", "worker", "--queue", "short,default"]
    networks: [akg]

  queue-long:
    <<: *backend_defaults
    command: ["bench", "worker", "--queue", "long,default,short"]
    networks: [akg]

  websocket:
    <<: *customizable_image
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks: [akg]

  frontend:
    <<: *customizable_image
    # akg_ess isn't baked into the image, so its assets aren't in the
    # baked assets dir nginx serves. Link the mounted app's public folder
    # in on every start (survives restarts/recreates), then run nginx.
    command:
      - bash
      - -c
      - "ln -sfn /home/frappe/frappe-bench/apps/akg_ess/akg_ess/public /home/frappe/frappe-bench/assets/akg_ess; exec nginx-entrypoint.sh"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: dev.localhost
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      # nginx serves /assets/akg_ess/* from the sites/assets symlink, which
      # points into this app dir — so the frontend needs it mounted too.
      - ${AKG_ESS_SRC:-..}:/home/frappe/frappe-bench/apps/akg_ess
    depends_on:
      backend: { condition: service_started }
      websocket: { condition: service_started }
    ports:
      - "8080:8080"
    networks: [akg]

volumes:
  sites:
  db-data:
  redis-cache-data:
  redis-queue-data:

networks:
  akg:
    name: akg
