<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>AKG ESS · Employee Self-Service</title>

<!-- Frappe-rendered web page directives -->
{% raw %}
<!-- PWA -->
<link rel="manifest" href="/assets/akg_ess/manifest.webmanifest" />
<meta name="theme-color" content="#0F1E33" />
<meta name="application-name" content="AKG ESS" />
<meta name="description" content="Attendance, leaves and petty cash for AKG Contracting field staff." />
<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AKG ESS" />
<link rel="apple-touch-icon" href="/assets/akg_ess/assets/apple-touch-icon.png" />
<!-- Android / generic -->
<link rel="icon" type="image/png" sizes="192x192" href="/assets/akg_ess/assets/icon-192.png" />
<link rel="icon" type="image/png" sizes="64x64" href="/assets/akg_ess/assets/favicon-64.png" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://a.tile.openstreetmap.org" crossorigin>
<link rel="preconnect" href="https://b.tile.openstreetmap.org" crossorigin>
<link rel="preconnect" href="https://c.tile.openstreetmap.org" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Leaflet CSS is vendored (self-hosted) so the app never depends on a third-party CDN. -->
<link rel="stylesheet" href="/assets/akg_ess/vendor/leaflet.css?v=83" />
<link rel="stylesheet" href="/assets/akg_ess/styles.css?v=83" />
</head>
<body>
<div id="root"></div>

<!-- Vendored libraries (self-hosted, production builds). No third-party CDN, no
     in-browser Babel: the JSX is pre-compiled into ess.bundle.js by `npm run build`. -->
<script src="/assets/akg_ess/vendor/react.production.min.js?v=83"></script>
<script src="/assets/akg_ess/vendor/react-dom.production.min.js?v=83"></script>
<script src="/assets/akg_ess/vendor/leaflet.js?v=83"></script>

<!-- Plain (non-JSX) globals — must run before the bundle (window.STRINGS / window.frappe). -->
<script src="/assets/akg_ess/data.js?v=83"></script>
<script src="/assets/akg_ess/api.js?v=83"></script>

<!-- Pre-compiled application bundle (ui + screens + app entry). -->
<script src="/assets/akg_ess/ess.bundle.js?v=83"></script>

<!-- ─── PWA bootstrap ─────────────────────────────────────────────────── -->
<script>
(function () {
  if ('serviceWorker' in navigator && location.protocol !== 'about:' && !location.ancestorOrigins?.length) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/assets/akg_ess/sw.js', { scope: '/ess/' }).catch((err) => {
        console.warn('[pwa] SW registration failed:', err);
      });
    });
  }

  let deferredPrompt = null;
  const DISMISSED_KEY = 'akg.installDismissed';

  function showBanner() {
    if (localStorage.getItem(DISMISSED_KEY)) return;
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    let b = document.getElementById('pwa-install-banner');
    if (b) { b.style.display = 'flex'; return; }
    b = document.createElement('div');
    b.id = 'pwa-install-banner';
    b.innerHTML = `
      <div class="pwa-banner-icon">
        <img src="/assets/akg_ess/assets/icon-192.png" alt="" />
      </div>
      <div class="pwa-banner-text">
        <div class="pwa-banner-title">Install AKG ESS</div>
        <div class="pwa-banner-sub">Get the app on your home screen — works offline.</div>
      </div>
      <button id="pwa-install-btn" class="pwa-banner-btn">Install</button>
      <button id="pwa-dismiss-btn" class="pwa-banner-close" aria-label="Dismiss">×</button>
    `;
    document.body.appendChild(b);
    document.getElementById('pwa-install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') localStorage.setItem(DISMISSED_KEY, '1');
      deferredPrompt = null;
      b.style.display = 'none';
    });
    document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
      localStorage.setItem(DISMISSED_KEY, '1');
      b.style.display = 'none';
    });
  }

  function showIosBanner() {
    if (localStorage.getItem(DISMISSED_KEY)) return;
    if (window.navigator.standalone) return;
    const b = document.createElement('div');
    b.id = 'pwa-install-banner';
    b.innerHTML = `
      <div class="pwa-banner-icon">
        <img src="/assets/akg_ess/assets/icon-192.png" alt="" />
      </div>
      <div class="pwa-banner-text">
        <div class="pwa-banner-title">Install AKG ESS</div>
        <div class="pwa-banner-sub">Tap <b>Share</b> ⎙ → <b>Add to Home Screen</b>.</div>
      </div>
      <button id="pwa-dismiss-btn" class="pwa-banner-close" aria-label="Dismiss">×</button>
    `;
    document.body.appendChild(b);
    document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
      localStorage.setItem(DISMISSED_KEY, '1');
      b.style.display = 'none';
    });
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(showBanner, 4000);
  });

  window.addEventListener('appinstalled', () => {
    localStorage.setItem(DISMISSED_KEY, '1');
    const b = document.getElementById('pwa-install-banner');
    if (b) b.style.display = 'none';
  });

  const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  if (isIos && isSafari) setTimeout(showIosBanner, 4000);
})();
</script>
{% endraw %}
</body>
</html>
